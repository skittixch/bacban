name: Feature request
description: Propose a focused BacBan improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently hard or unsafe?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should BacBan do differently?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Board UI
        - Mobile UI
        - Backend API
        - Agent write contract
        - Event intake
        - Demo/onboarding
        - Documentation
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: How would we verify it?
      placeholder: "Example: Docker build passes, demo seed renders, API readback confirms updated card."
    validations:
      required: true
