name: Bug report
description: Report reproducible behavior in the board, API, or local automation path.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a focused report. Do not include live board data, credentials, Gmail payloads, phone numbers, or private webhook logs.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the visible behavior and the expected behavior.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Board UI
        - Mobile UI
        - Backend API
        - Demo data
        - Docker setup
        - Agent write contract
        - Gmail/OpenCLAW integration
        - Documentation
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use demo data whenever possible.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste sanitized logs, screenshots, or command output.
      render: shell

  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed live board data, credentials, tokens, phone numbers, Gmail payloads, and private local paths.
          required: true
