name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Guard Scorecard permission shape
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          workflow = Path(".github/workflows/scorecard.yml")
          text = workflow.read_text(encoding="utf-8")
          top_level = text.split("\njobs:", 1)[0]
          forbidden = ["security-events: write", "id-token: write"]
          offenders = [
              permission
              for permission in forbidden
              if re.search(rf"(?m)^  {re.escape(permission)}\s*$", top_level)
          ]
          missing_job_scope = [
              permission
              for permission in forbidden
              if not re.search(rf"(?m)^      {re.escape(permission)}\s*$", text)
          ]
          if offenders or missing_job_scope:
              print("Scorecard permissions must keep write scopes job-local.")
              print(f"workflow-level write permissions found: {offenders}")
              print(f"job-level write permissions missing: {missing_job_scope}")
              sys.exit(1)
          PY

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build services
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        shell: bash
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/health | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down --volumes
